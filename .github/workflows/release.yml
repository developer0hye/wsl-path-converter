name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch "^v(.+)$") { throw "Tag must start with 'v': $tag" }

          $version = $Matches[1]
          $isPreview = $version.Contains("-")

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "is_preview=$($isPreview.ToString().ToLower())" >> $env:GITHUB_OUTPUT

      - name: Sync app version
        shell: pwsh
        run: |
          $scriptPath = "wsl-path-converter.ahk"
          $content = Get-Content -Path $scriptPath -Raw
          $replacement = 'global AppVersion := "${{ steps.meta.outputs.version }}"'
          # Match both LF and CRLF line endings on GitHub runners.
          $updated = [Regex]::Replace($content, '(?m)^global AppVersion := ".*"\r?$', $replacement, 1, 0)
          if ($updated -eq $content) { throw "Could not find AppVersion line in $scriptPath" }
          Set-Content -Path $scriptPath -Value $updated -Encoding UTF8

      - name: Setup AutoHotkey v2 Compiler
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{ Authorization = "token $env:GH_TOKEN" }
          $ahk = Invoke-RestMethod "https://api.github.com/repos/AutoHotkey/AutoHotkey/releases/latest" -Headers $headers
          $zip = ($ahk.assets | Where-Object { $_.name -like '*.zip' })[0]
          Invoke-WebRequest $zip.browser_download_url -OutFile ahk.zip
          Expand-Archive ahk.zip -DestinationPath .\ahk

          $comp = Invoke-RestMethod "https://api.github.com/repos/AutoHotkey/Ahk2Exe/releases/latest" -Headers $headers
          $czip = ($comp.assets | Where-Object { $_.name -like '*.zip' })[0]
          Invoke-WebRequest $czip.browser_download_url -OutFile compiler.zip
          Expand-Archive compiler.zip -DestinationPath .\ahk\Compiler

      - name: Compile EXE
        shell: pwsh
        run: |
          $base = Get-ChildItem .\ahk -Filter "AutoHotkey64.exe" -Recurse | Select-Object -First 1
          if (!$base) { throw "AutoHotkey64.exe not found" }
          .\ahk\Compiler\Ahk2Exe.exe /in wsl-path-converter.ahk /out wsl-path-converter.exe /base $base.FullName /icon app-icon.ico
          # Ahk2Exe can return before the output file is fully written, so wait briefly.
          $timeout = 30
          while ($timeout -gt 0 -and !(Test-Path wsl-path-converter.exe)) {
            Start-Sleep -Seconds 1
            $timeout--
          }
          if (!(Test-Path wsl-path-converter.exe)) { throw "Compilation failed" }
          Get-Item wsl-path-converter.exe

      - name: Setup Inno Setup
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            choco install innosetup --no-progress -y
          }
          if (!(Test-Path $iscc)) { throw "ISCC.exe not found after install" }

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=${{ steps.meta.outputs.version }}" "installer\wsl-path-converter.iss"
          if (!(Test-Path wsl-path-converter-setup.exe)) { throw "Installer build failed" }
          Get-Item wsl-path-converter-setup.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wsl-path-converter.exe
            wsl-path-converter-setup.exe
          draft: ${{ steps.meta.outputs.is_preview == 'true' }}
          prerelease: ${{ steps.meta.outputs.is_preview == 'true' }}
          generate_release_notes: true
